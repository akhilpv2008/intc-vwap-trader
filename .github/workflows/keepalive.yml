name: keepalive
on:
  schedule:
    - cron: '0 12 * * 1-5'   # 8 AM ET every weekday — keeps workflows from being disabled
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Heartbeat commit
        run: |
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .heartbeat
          git config user.name "auto-agent"
          git config user.email "akhilfromusa@gmail.com"
          git add .heartbeat
          git commit -m "heartbeat: $(date -u +%Y-%m-%d)" || echo "no change"
          git push || echo "push skipped"

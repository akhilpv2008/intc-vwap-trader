name: dip-trader
# Mean-reversion "buy the dip" strategy. Runs ONCE near the close to make the day's buy/exit
# decision on end-of-day RSI(2). Holds 1-5 days (overnight ok). Replaces the momentum market-runner.
on:
  schedule:
    - cron: '35 13 * * 1-5'   # 9:35 AM ET - MORNING SAFETY run (verify positions + re-arm stops only)
    - cron: '45 19 * * 1-5'   # 3:45 PM ET Mon-Fri - DECISION run (entries/exits near the daily close)
  workflow_dispatch: {}
concurrency: { group: dip-trader, cancel-in-progress: false }
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run dip-buyer
        shell: pwsh
        env:
          APCA_API_BASE_URL:   ${{ secrets.APCA_API_BASE_URL }}
          APCA_API_KEY_ID:     ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: pwsh ./dip_trader.ps1

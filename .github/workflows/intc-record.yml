name: intc-record

on:
  schedule:
    - cron: '10 20 * * 1-5'   # ~just after 4pm ET close
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: intc-record
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Append daily P&L row
        shell: pwsh
        env:
          APCA_API_BASE_URL:   ${{ secrets.APCA_API_BASE_URL }}
          APCA_API_KEY_ID:     ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: pwsh ./intc_record.ps1
      - name: Commit history
        run: |
          git config user.name "intc-bot"
          git config user.email "akhilfromusa@gmail.com"
          git add pnl_history.csv
          git diff --staged --quiet || git commit -m "track record: $(date -u +%Y-%m-%d)"
          git push

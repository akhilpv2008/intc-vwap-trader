name: auto-trader
on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'   # every ~5 min, market hours
  workflow_dispatch: {}
concurrency: { group: auto-trader, cancel-in-progress: false }
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check trader.ps1
        shell: pwsh
        run: |
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile("./trader.ps1", [ref]$null, [ref]$errors)
          if ($errors.Count -gt 0) {
            foreach ($e in $errors) { Write-Error "Line $($e.Extent.StartLineNumber): $($e.Message)" }
            exit 1
          }
          Write-Host "Syntax OK"
      - name: Trade the day's pick
        shell: pwsh
        env:
          APCA_API_BASE_URL:   ${{ secrets.APCA_API_BASE_URL }}
          APCA_API_KEY_ID:     ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: pwsh ./trader.ps1
